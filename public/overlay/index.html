<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CrickFlow Overlay</title>
  <style>
    /*
      Transparent broadcast overlay for OBS/vMix browser sources.
      Colors, layout and animations mirror the in-app burn-in landscape
      scorebug (ScorebugTokens, LandscapeBroadcastScorebug, LandscapeTopHeader,
      LandscapeEventBanner). Sizing is in vh so it scales with a 1920x1080 source.
    */
    :root {
      --navy: rgba(13, 71, 161, 0.92);
      --blue: rgba(30, 136, 229, 0.92);
      --panel: rgba(27, 111, 193, 0.98);
      --white: #ffffff;
      --on-score: #0a1628;
      --gold: #ffc107;
      --live: #e53935;
      --ev-wicket: #c62828;
      --ev-wicket-dark: #8e1c1c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Top header: title chip (left) + brand/LIVE (right) ---------- */
    .top {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 2.4vh 3vh 0 3vh;
      opacity: 0; transition: opacity .45s ease;
    }
    .top.show { opacity: 1; }
    .title-chip {
      background: rgba(27, 111, 193, 0.92);
      border-left: 0.4vh solid var(--gold);
      border-radius: 0.8vh;
      padding: 0.7vh 1.3vh;
      color: var(--white);
      font-weight: 800; font-size: 1.8vh; letter-spacing: 0.2px; line-height: 1.15;
      max-width: 60vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      box-shadow: 0 0.4vh 1vh rgba(0, 0, 0, 0.35);
    }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 0.6vh; }
    .brand .logo-img { width: 5.2vh; height: 5.2vh; object-fit: contain; }
    .brand .fallback { color: var(--gold); font-size: 4.4vh; line-height: 1; }
    .live-badge {
      background: var(--live); color: var(--white);
      font-size: 1.3vh; font-weight: 900; letter-spacing: 0.12vh;
      padding: 0.35vh 0.9vh;
    }

    /* ---------- Bottom scorebug ---------- */
    .stage {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end;
      padding: 0 4vh 4vh 4vh;
    }
    .scorebug {
      width: 100%;
      display: flex; align-items: flex-end;
      opacity: 0; transform: translateY(1.4vh);
      transition: opacity .45s ease, transform .45s ease;
      filter: drop-shadow(0 0.5vh 1.4vh rgba(0, 0, 0, 0.38));
    }
    .scorebug.show { opacity: 1; transform: translateY(0); }

    .left-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .chip-row { display: flex; gap: 0.7vh; margin-bottom: 0.6vh; min-height: 0; }
    .chip {
      display: inline-flex; align-items: center; gap: 0.5vh;
      background: var(--navy); color: var(--white);
      font-size: 1.7vh; font-weight: 800; letter-spacing: 0.4px;
      padding: 0.45vh 1.1vh; white-space: nowrap;
    }
    .chip .k { color: var(--gold); }

    .main-row { display: flex; align-items: stretch; height: 6vh; min-width: 0; }

    .logo {
      width: 6vh; height: 6vh; overflow: hidden;
      background: var(--white); color: var(--on-score);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.9vh; line-height: 1;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }

    .abbrev {
      display: flex; align-items: center; justify-content: center;
      background: var(--navy); color: var(--white);
      font-weight: 900; font-size: 1.9vh; letter-spacing: 1px;
      padding: 0 1.3vh; min-width: 6vh;
    }
    .score {
      display: flex; align-items: center; justify-content: center;
      background: var(--white); color: var(--on-score);
      font-weight: 900; font-size: 3.3vh; line-height: 1;
      padding: 0 1.8vh; min-width: 8vh;
    }
    .overs {
      display: flex; align-items: center; justify-content: center;
      background: var(--blue); color: var(--white);
      font-weight: 800; font-size: 2.3vh; padding: 0 1.3vh; min-width: 5.5vh;
    }

    /* Center batsmen block — hosts the event graphic. */
    .batsmen {
      position: relative; flex: 1; min-width: 0;
      background: var(--navy);
      display: flex; align-items: center;
      padding: 0 3vh; gap: 5.5vh; overflow: hidden;
    }
    .batter {
      display: flex; align-items: baseline; gap: 1.1vh;
      color: var(--white); white-space: nowrap; min-width: 0;
    }
    .batter .nm {
      font-size: 2.1vh; font-weight: 600; letter-spacing: .3px;
      overflow: hidden; text-overflow: ellipsis; max-width: 24vh;
    }
    .batter.on .nm { font-weight: 800; }
    .batter.off { opacity: .86; }
    .batter .rs { font-size: 2.3vh; font-weight: 900; }
    .batter .bl { font-size: 1.8vh; font-weight: 500; opacity: .68; }
    .batter .bat { font-size: 1.9vh; margin-right: -0.4vh; }

    .target {
      margin-left: auto; align-self: stretch;
      display: flex; align-items: center; gap: 0.5vh;
      background: var(--white); color: var(--on-score);
      font-size: 3vh; font-weight: 900; line-height: 1; padding: 0 1.4vh;
    }
    .target .dot { color: var(--live); font-size: 2.2vh; }

    .bowler-col {
      margin-left: 6vh; flex: none;
      display: flex; flex-direction: column; align-items: stretch;
    }
    .this-over {
      height: 2.4vh; display: flex; gap: 0.4vh; align-items: stretch;
      margin-bottom: 0.35vh;
    }
    .ball {
      min-width: 2.2vh; padding: 0 0.45vh;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2vh; font-weight: 900; color: var(--white);
      background: var(--blue);
    }
    .ball.bnd { background: var(--gold); color: var(--on-score); }
    .ball.wkt { background: var(--live); }
    .bowler { display: flex; align-items: center; height: 6vh;
      min-width: 24vh; max-width: 36vh; }
    .bowler .details {
      flex: 1; display: flex; align-items: center; gap: 1.2vh;
      background: var(--panel); color: var(--white);
      height: 100%; padding: 0 1.4vh; min-width: 0;
    }
    .bowler .nm { font-size: 2vh; font-weight: 700; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    .bowler .fg { margin-left: auto; font-size: 2vh; font-weight: 900;
      color: var(--gold); white-space: nowrap; }

    /* ---------- Event graphic (FOUR / SIX / WICKET) ---------- */
    .event {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      opacity: 0; transform: translateY(35%);
      transition: opacity .36s ease, transform .36s ease;
      pointer-events: none;
    }
    .event.in {
      opacity: 1; transform: translateY(0);
      transition: opacity .42s ease,
                  transform .42s cubic-bezier(.16, .84, .44, 1);
    }
    .event.four, .event.six {
      background: linear-gradient(90deg, #ffc107, #ffa000);
    }
    .event.wicket {
      background: linear-gradient(90deg, var(--ev-wicket), var(--ev-wicket-dark));
    }
    .ev-pattern {
      position: absolute; inset: 0;
      display: flex; flex-wrap: wrap; align-content: center;
      justify-content: center; gap: 0.4vh 1.2vh; overflow: hidden;
    }
    .ev-pattern span { font-size: 3.6vh; font-weight: 900; line-height: 1; }
    .event.four .ev-pattern span, .event.six .ev-pattern span {
      color: rgba(0, 0, 0, 0.12);
    }
    .event.wicket .ev-pattern span { color: rgba(239, 154, 154, 0.16); }
    .ev-body { position: relative; display: flex; flex-direction: column;
      align-items: center; text-align: center; }
    .ev-label { font-weight: 900; font-size: 2.9vh; line-height: 1; }
    .event.four .ev-label, .event.six .ev-label { color: #000; letter-spacing: 0.4vh; }
    .event.wicket .ev-label { color: #fff; letter-spacing: 0.55vh; }
    .ev-sub { margin-top: 0.5vh; font-size: 1.5vh; font-weight: 800;
      letter-spacing: 0.15vh; text-transform: uppercase; }
    .event.four .ev-sub, .event.six .ev-sub { color: rgba(0,0,0,.8); }
    .event.wicket .ev-sub { color: rgba(255,255,255,.9); }

    #err {
      position: absolute; bottom: 0.6vh; left: 0.8vh;
      color: rgba(255, 255, 255, 0.3); font-size: 1.4vh; font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="top" id="top">
    <div class="title-chip" id="title">CrickFlow</div>
    <div class="brand">
      <img class="logo-img" id="brand-img" alt="" />
      <span class="fallback" id="brand-fallback" style="display:none">\uD83C\uDFCF</span>
      <span class="live-badge" id="live-badge" style="display:none">LIVE</span>
    </div>
  </div>

  <div class="stage">
    <div class="scorebug" id="bug">
      <div class="left-col">
        <div class="chip-row" id="chips"></div>
        <div class="main-row">
          <div class="logo" id="bat-logo">?</div>
          <div class="abbrev" id="abbrev">—</div>
          <div class="score" id="score">0/0</div>
          <div class="overs" id="overs">0.0</div>
          <div class="batsmen" id="batsmen-wrap">
            <div class="event" id="event"></div>
          </div>
        </div>
      </div>
      <div class="bowler-col">
        <div class="this-over" id="this-over"></div>
        <div class="bowler">
          <div class="logo" id="bowl-logo">?</div>
          <div class="details">
            <span class="nm" id="bowler-name">—</span>
            <span class="fg" id="bowler-fig">0-0 0.0</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="err"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCHRvYTM7weKV8MhiBcEQ16LNH6Hd0Csq8",
      authDomain: "crickflow-b06bc.firebaseapp.com",
      projectId: "crickflow-b06bc",
    });
    var db = firebase.firestore();

    var CRICKFLOW_LOGO = "https://crickflow-b06bc.web.app/assets/crickflow-logo.png";

    function el(id) { return document.getElementById(id); }

    function matchIdFromPath() {
      var parts = location.pathname.split("/").filter(Boolean);
      if (parts[0] === "overlay" && parts[1]) return parts[1];
      return new URLSearchParams(location.search).get("m");
    }

    function formatOvers(balls, bpo) {
      bpo = bpo || 6;
      return Math.floor(balls / bpo) + "." + (balls % bpo);
    }

    function initials(name) {
      var t = (name || "").trim();
      if (!t) return "?";
      var w = t.split(/\s+/);
      if (w.length >= 2) return (w[0][0] + w[1][0]).toUpperCase();
      return t.slice(0, 2).toUpperCase();
    }
    function teamAbbrev(name) {
      var t = (name || "").trim();
      if (!t) return "—";
      var w = t.split(/\s+/);
      if (w.length >= 2) return (w[0][0] + w[1][0]).toUpperCase();
      return t.slice(0, 3).toUpperCase();
    }
    function shortName(name, max) {
      var u = (name || "").trim().toUpperCase();
      return u.length <= max ? u : u.slice(0, max);
    }
    function bowlingTeamName(d, batting) {
      if (batting === d.teamAName) return d.teamBName;
      if (batting === d.teamBName) return d.teamAName;
      return d.teamBName;
    }
    function setLogo(id, url, name) {
      var node = el(id);
      node.textContent = "";
      if (url) {
        var img = document.createElement("img");
        img.alt = "";
        img.onerror = function () { node.textContent = initials(name); };
        img.src = url;
        node.appendChild(img);
      } else {
        node.textContent = initials(name);
      }
    }

    /* ---- Fixed batter slots (port of ScorebugBatterSlotTracker) ---- */
    var slotLeft = null, slotRight = null, slotMatch = null;
    function slotReset() { slotLeft = null; slotRight = null; }
    function replacementName(set, exclude) {
      for (var i = 0; i < set.length; i++) if (set[i] !== exclude) return set[i];
      return null;
    }
    function refreshSlots(striker, nonStriker, atCrease) {
      var has = function (n) { return atCrease.indexOf(n) >= 0; };
      if (slotLeft && !has(slotLeft)) {
        slotLeft = replacementName(atCrease, slotRight) ||
          (striker || nonStriker);
      }
      if (slotRight && !has(slotRight)) {
        slotRight = replacementName(atCrease, slotLeft) ||
          (nonStriker || striker);
      }
      for (var i = 0; i < atCrease.length; i++) {
        var name = atCrease[i];
        if (name === slotLeft || name === slotRight) continue;
        if (!slotLeft || !has(slotLeft)) slotLeft = name;
        else if (!slotRight || !has(slotRight)) slotRight = name;
        else slotRight = name;
      }
      if (!slotLeft) slotLeft = striker || nonStriker;
      if (!slotRight && nonStriker && nonStriker !== slotLeft) slotRight = nonStriker;
      else if (!slotRight && striker && striker !== slotLeft) slotRight = striker;
    }
    function resolveSlots(o) {
      if (slotMatch !== o.matchId) { slotMatch = o.matchId; slotReset(); }
      var striker = (o.strikerName || "").trim();
      var nonStriker = (o.nonStrikerName || "").trim();
      var atCrease = [];
      if (striker) atCrease.push(striker);
      if (nonStriker && nonStriker !== striker) atCrease.push(nonStriker);
      if (atCrease.length === 0) { slotReset(); return []; }

      var has = function (n) { return atCrease.indexOf(n) >= 0; };
      if (slotLeft && slotRight && !has(slotLeft) && !has(slotRight)) {
        slotLeft = null; slotRight = null;
      }
      if (!slotLeft && !slotRight) {
        slotLeft = striker || nonStriker;
        slotRight = (nonStriker && nonStriker !== slotLeft) ? nonStriker
          : ((striker && striker !== slotLeft) ? striker : null);
      } else {
        refreshSlots(striker, nonStriker, atCrease);
      }

      var slots = [];
      if (slotLeft) slots.push(slotFor(slotLeft, o));
      if (slotRight && slotRight !== slotLeft) slots.push(slotFor(slotRight, o));
      return slots;
    }
    function slotFor(name, o) {
      if ((o.strikerName || "").trim() === name) {
        return { name: name, runs: o.strikerRuns, balls: o.strikerBalls, on: true };
      }
      if ((o.nonStrikerName || "").trim() === name) {
        return { name: name, runs: o.nonStrikerRuns, balls: o.nonStrikerBalls, on: false };
      }
      return { name: name, runs: 0, balls: 0, on: false };
    }

    function batterHtml(s) {
      return '<div class="batter ' + (s.on ? 'on' : 'off') + '">' +
        (s.on ? '<span class="bat">\uD83C\uDFCF</span>' : '') +
        '<span class="nm">' + shortName(s.name, 20) + '</span>' +
        '<span class="rs">' + (s.runs || 0) + '</span>' +
        '<span class="bl">' + (s.balls || 0) + '</span>' +
        '</div>';
    }

    function ballCellClass(label) {
      var up = (label || "").toUpperCase();
      if (up.indexOf("W") >= 0 && up !== "WD") return "ball wkt";
      if (label === "4" || label === "6") return "ball bnd";
      return "ball";
    }

    function render(o, d) {
      var bpo = (d.rules && d.rules.ballsPerOver) || o.ballsPerOver || 6;
      var ex = d.overlayExtras || {};
      var hasBatting = !!(o.battingTeamName || o.strikerName ||
        o.totalRuns || o.totalWickets);

      // Header
      el("title").textContent = ex.matchTitle || d.title ||
        ((d.teamAName || "") + " vs " + (d.teamBName || ""));
      var isLive = d.status === "live" || (d.stream && d.stream.status === "live");
      el("live-badge").style.display = isLive ? "" : "none";
      el("top").classList.add("show");

      if (!hasBatting) { el("bug").classList.remove("show"); return; }

      var batting = o.battingTeamName || d.teamAName || "";
      setLogo("bat-logo", ex.battingTeamLogoUrl, batting);
      el("abbrev").textContent = teamAbbrev(batting);
      el("score").textContent = (o.totalRuns || 0) + "/" + (o.totalWickets || 0);
      el("overs").textContent = formatOvers(o.legalBalls || 0, bpo);

      // Batsmen (fixed slots) + target chip
      var wrap = el("batsmen-wrap");
      Array.prototype.slice.call(wrap.querySelectorAll(".batter,.target"))
        .forEach(function (n) { n.remove(); });
      var slots = resolveSlots(o);
      var frag = "";
      for (var i = 0; i < slots.length; i++) frag += batterHtml(slots[i]);
      if (o.target) {
        frag += '<div class="target"><span class="dot">\u25C9</span>' +
          o.target + '</div>';
      }
      el("event").insertAdjacentHTML("beforebegin", frag);

      // Bowler + logo
      var bowlName = bowlingTeamName(d, batting);
      setLogo("bowl-logo", ex.bowlingTeamLogoUrl, bowlName);
      el("bowler-name").textContent = shortName(o.bowlerName, 14) || "—";
      el("bowler-fig").textContent =
        (o.bowlerWickets || 0) + "-" + (o.bowlerRuns || 0) + " " +
        formatOvers(o.bowlerBalls || 0, bpo);

      // This over strip
      var over = "";
      var labels = ex.thisOver || [];
      for (var j = 0; j < labels.length; j++) {
        var lb = labels[j] === "0" ? "\u2022" : labels[j];
        over += '<div class="' + ballCellClass(labels[j]) + '">' + lb + "</div>";
      }
      el("this-over").innerHTML = over;

      // Chips
      var chips = "";
      if (typeof o.runRate === "number") {
        chips += '<div class="chip"><span class="k">CRR</span>' +
          o.runRate.toFixed(2) + '</div>';
      }
      if (typeof o.requiredRunRate === "number") {
        chips += '<div class="chip"><span class="k">RRR</span>' +
          o.requiredRunRate.toFixed(2) + '</div>';
      }
      el("chips").innerHTML = chips;

      el("bug").classList.add("show");
    }

    // ---- Event graphics (clock-independent: skip the event present on load) ----
    var EVENT_ENTER = 420, EVENT_HOLD = 4000;
    var seenFirstSnapshot = false;
    var lastEventId = null;
    var eventOutTimer = null;

    function patternFor(kind) {
      var ch = kind === "wicket" ? "W" : (kind === "six" ? "6" : "4");
      var spans = "";
      for (var i = 0; i < 26; i++) spans += "<span>" + ch + "</span>";
      return '<div class="ev-pattern">' + spans + "</div>";
    }

    function playEvent(ev) {
      var kind = (ev.kind || "").toLowerCase();
      if (kind !== "four" && kind !== "six" && kind !== "wicket") return;

      var box = el("event");
      var sub = ev.subtitle
        ? '<div class="ev-sub">' + ev.subtitle + "</div>" : "";
      box.className = "event " + kind;
      box.innerHTML = patternFor(kind) +
        '<div class="ev-body"><div class="ev-label">' +
        (ev.label || kind.toUpperCase()) + "</div>" + sub + "</div>";

      clearTimeout(eventOutTimer);
      // Double rAF guarantees the browser paints the reset state before the
      // enter transition, so the slide/fade always animates.
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { box.classList.add("in"); });
      });
      eventOutTimer = setTimeout(function () {
        box.classList.remove("in");
      }, EVENT_ENTER + EVENT_HOLD);
    }

    function handleEvent(ev) {
      if (!ev || !ev.id) return;
      if (!seenFirstSnapshot) { lastEventId = ev.id; return; }
      if (ev.id === lastEventId) return;
      lastEventId = ev.id;
      playEvent(ev);
    }

    // Brand logo with graceful fallback.
    (function () {
      var img = el("brand-img");
      img.onerror = function () {
        img.style.display = "none";
        el("brand-fallback").style.display = "";
      };
      img.src = CRICKFLOW_LOGO;
    })();

    var matchId = matchIdFromPath();
    if (!matchId) {
      el("err").textContent = "Missing match id. Use /overlay/MATCH_ID";
    } else {
      db.collection("matches").doc(matchId).collection("public").doc("scorecard")
        .onSnapshot(function (snap) {
          if (!snap.exists) {
            el("err").textContent = "Waiting for match data…";
            el("bug").classList.remove("show");
            return;
          }
          el("err").textContent = "";
          var d = snap.data();
          var o = d.overlay;
          if (!o) {
            var innArr = d.innings || [];
            var inn = innArr[innArr.length - 1];
            o = inn ? {
              battingTeamName: d.teamAName,
              totalRuns: inn.totalRuns,
              totalWickets: inn.totalWickets,
              legalBalls: inn.legalBalls,
              ballsPerOver: (d.rules && d.rules.ballsPerOver) || 6,
            } : {};
          }
          render(o, d);
          handleEvent(d.event);
          seenFirstSnapshot = true;
        }, function (e) {
          el("err").textContent = "Overlay error: " + e.code;
        });
    }
  </script>
</body>
</html>
