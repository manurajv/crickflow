<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open in CrickFlow</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0a1628;
      color: #e8e8e8;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 { color: #d4af37; }
    a.btn {
      display: inline-block;
      background: #d4af37;
      color: #0a1628;
      text-decoration: none;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 8px;
      margin-top: 20px;
    }
    p { color: #94a3b8; line-height: 1.5; }
    code { background: #132238; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <div>
    <h1>🏏 CrickFlow</h1>
    <p id="msg">Opening link in the app…</p>
    <p><a id="open" class="btn" href="#">Open in CrickFlow</a></p>
    <p style="margin-top: 24px; font-size: 14px;">
      Install the app from your store, then tap the button above.
    </p>
  </div>
  <script>
    (function () {
      var parts = location.pathname.split('/').filter(Boolean);
      var qs = location.search || '';
      var appPath = '/';
      var msg = 'Open the CrickFlow app.';
      var androidPackage = 'com.mavixas.crickflow';

      if (parts[0] === 'match' && parts[1]) {
        appPath = '/match/' + parts[1];
        if (parts[2]) appPath += '/' + parts[2];
        if (parts[2] === 'takeover') {
          msg = 'Take over live scoring — open in the CrickFlow app.';
        } else {
          msg = 'Match link — open in the CrickFlow app to view the scorecard.';
        }
      } else if (parts[0] === 'teams' && parts[1]) {
        appPath = '/teams/' + parts[1];
        msg = 'Team invite — open in CrickFlow to join the squad.';
      } else {
        appPath = '/home';
      }

      var deepPath = appPath.charAt(0) === '/' ? appPath.slice(1) : appPath;
      var appUrl = 'crickflow://' + deepPath + qs;
      var intentUrl =
        'intent://' + deepPath + qs +
        '#Intent;scheme=crickflow;package=' + androidPackage +
        ';S.browser_fallback_url=' + encodeURIComponent(location.href) +
        ';end';

      document.getElementById('msg').textContent = msg;
      var link = document.getElementById('open');
      link.href = appUrl;

      var ua = navigator.userAgent || '';
      if (/Android/i.test(ua)) {
        window.location.href = intentUrl;
      } else if (/iPhone|iPad/i.test(ua)) {
        window.location.href = appUrl;
        setTimeout(function () {
          link.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 1200);
      } else {
        link.focus();
      }
    })();
  </script>
</body>
</html>
