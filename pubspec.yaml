name: crickflow
description: Professional cricket scoring and live broadcasting for Sri Lanka.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  app_links: ^6.4.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5

  # Auth providers
  google_sign_in: ^6.3.0

  geolocator: ^14.0.1
  geocoding: ^4.0.0
  http: ^1.4.0

  # Utilities
  equatable: ^2.0.7
  uuid: ^4.5.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.5.3
  collection: ^1.19.1
  share_plus: ^10.1.4
  rtmp_broadcaster: ^2.3.4
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
